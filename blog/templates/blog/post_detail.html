<!DOCTYPE html>
<html>
<head>
    <title>{{ post.title }}</title>
</head>
<body>

<h1>{{ post.title }}</h1>

<img src="{{ post.thumbnail.url }}" width="400">

<hr>

<div>
    {{ post.content|safe }}
</div>
{% comment %} The safe filter allows HTML generated by CKEditor to render properly. {% endcomment %}

<a href="{% url 'update_post' post.id %}">
    Edit
</a>

<a href="{% url 'delete_post' post.id %}">
    Delete
</a>
</body>
</html>

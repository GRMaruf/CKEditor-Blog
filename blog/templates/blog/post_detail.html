{% extends 'master/base.html' %}

{% block title %}
  {{ post.title }}
{% endblock %}

{% block content %}
  <h1 class="text-center p-3">{{ post.title }}</h1>

  <img src="{{ post.thumbnail.url }}" width="100%" />

  <hr />

  <div>{{ post.content|safe }}</div>
  {% comment %}The safe filter allows HTML generated by CKEditor to render properly.{% endcomment %}

  <a href="{% url 'update_post' post.id %}" class="btn btn-primary">Edit</a>
  <a href="{% url 'delete_post' post.id %}" class="btn btn-outline-primary">Delete</a>
{% endblock %}

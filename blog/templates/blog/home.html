{% extends 'master/base.html' %}

{% block title %}
  Blog
{% endblock %}

{% block content %}
  <h1>Posts</h1>

  {% for post in posts %}
    <div style="margin-bottom:40px;">
      <img src="{{ post.thumbnail.url }}" width="250" />

      <h2><a href="{% url 'post_detail' post.id %}">{{ post.title }}</a></h2>
    </div>
  {% endfor %}
{% endblock %}

{% extends 'master/base.html' %}

{% block title %}
  Delete Post
{% endblock %}

{% block body %}
  <div class="text-center p-5">
    <h1>Delete Post</h1>

    <p>
      Are you sure you want to delete:
      <strong>{{ object.title }}</strong> ?
    </p>

    <form method="POST">
      {% csrf_token %}

      <button type="submit" class="btn btn-primary">Yes, Delete</button>
    </form>
  </div>
{% endblock %}

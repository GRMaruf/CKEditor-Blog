{% extends 'master/base.html' %}

{% block title %}
  Update Post
{% endblock %}

{% block extra %}
  {{ form.media }}
{% endblock %}

{% block body %}
    <form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="m-2">
      Title: {{ form.title }} Thumbnail: {{ form.thumbnail }}
    <button class="btn btn-primary">Update</button>
    </div>
    {{ form.content }}
  </form>
{% endblock %}
